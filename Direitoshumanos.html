<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Direitos Humanos na Escola</title>

<style>
body{
font-family:Arial;
background:#60a5fa;
margin:0;
}

header{
background:#1e3a8a;
color:white;
padding:15px;
}

nav{
background:#0ea5e9;
padding:10px;
}

button{
padding:10px;
margin:5px;
}

.section{
display:none;
padding:20px;
background:white;
margin:20px;
}

.active{
display:block;
}
</style>

</head>
<body>

<header>
<h2>Direitos Humanos na Escola</h2>
</header>

<nav>
<button onclick="mostrar('inicio')">Início</button>
<button onclick="mostrar('prof')">Professores</button>
<button onclick="mostrar('alunos')">Alunos</button>
<button onclick="mostrar('coment')">Comentários</button>
</nav>

<div id="inicio" class="section active">
<h3>Início</h3>
<p>Direitos humanos na escola garantem respeito entre alunos e professores.</p>
</div>

<div id="prof" class="section">
<h3>Professores</h3>
<p>Os professores devem incentivar respeito e diálogo.</p>
</div>

<div id="alunos" class="section">
<h3>Alunos</h3>
<p>Os alunos devem respeitar colegas e professores.</p>
</div>

<div id="coment" class="section">
<h3>Comentários</h3>
<input id="nome" placeholder="Nome"><br><br>
<textarea id="texto"></textarea><br>
<button onclick="comentar()">Enviar</button>

<p>Total: <span id="contador">0</span></p>
<div id="lista"></div>
</div>

<script>
function mostrar(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

let comentarios=[];

function comentar(){
let nome=document.getElementById("nome").value
let texto=document.getElementById("texto").value

if(!nome || !texto) return

comentarios.push({nome,texto})
render()
}

function render(){
let lista=document.getElementById("lista")
lista.innerHTML=""

comentarios.forEach(c=>{
lista.innerHTML+=`<p><b>${c.nome}</b>: ${c.texto}</p>`
})

contador.innerText=comentarios.length
}
</script>

</body>
</html>
