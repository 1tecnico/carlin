<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila do Carlin - Versão Profissional</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    text-align: center;
}

header {
    padding: 20px;
}

.container {
    background: white;
    color: black;
    max-width: 600px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

input {
    padding: 10px;
    width: 60%;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #2a5298;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #1e3c72;
}

ul {
    list-style: none;
    padding: 0;
    margin-top: 20px;
}

li {
    background: #f4f6f9;
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.concluido {
    text-decoration: line-through;
    color: gray;
}

.info {
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
    <h1>🎒 Mochila do Carlin</h1>
    <p id="dataAtual"></p>
</header>

<div class="container">
    <input type="text" id="itemInput" placeholder="Digite o material ou tarefa...">
    <button onclick="adicionarItem()">Adicionar</button>

    <ul id="lista"></ul>

    <div class="info">
        Total de itens: <span id="total">0</span>
    </div>
</div>

<script>
const input = document.getElementById("itemInput");
const lista = document.getElementById("lista");
const total = document.getElementById("total");

let itens = JSON.parse(localStorage.getItem("mochilaPro")) || [];

document.getElementById("dataAtual").innerText =
    "Data: " + new Date().toLocaleDateString("pt-BR");

function atualizar() {
    lista.innerHTML = "";
    itens.forEach((item, index) => {
        const li = document.createElement("li");

        const span = document.createElement("span");
        span.textContent = "📘 " + item.texto;
        if (item.concluido) span.classList.add("concluido");

        span.onclick = () => {
            item.concluido = !item.concluido;
            atualizar();
        };

        const btn = document.createElement("button");
        btn.textContent = "Remover";
        btn.onclick = () => {
            itens.splice(index, 1);
            atualizar();
        };

        li.appendChild(span);
        li.appendChild(btn);
        lista.appendChild(li);
    });

    total.textContent = itens.length;
    localStorage.setItem("mochilaPro", JSON.stringify(itens));
}

function adicionarItem() {
    const valor = input.value.trim();
    if (valor === "") return;

    itens.push({ texto: valor, concluido: false });
    input.value = "";
    atualizar();
}

input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") adicionarItem();
});

atualizar();
</script>

</body>
</html>
