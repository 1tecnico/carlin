<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mochila Escolar IA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
}

header{
text-align:center;
padding:20px;
font-size:26px;
}

.imagem-topo{
text-align:center;
margin-bottom:15px;
}

.imagem-topo img{
max-width:300px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:8px;
padding:10px;
}

nav button{
padding:10px;
border:none;
border-radius:10px;
background:white;
color:#1e3c72;
font-weight:bold;
cursor:pointer;
}

section{
display:none;
max-width:900px;
margin:auto;
background:white;
color:black;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.active{
display:block;
}

input,textarea{
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#2a5298;
color:white;
cursor:pointer;
}

ul{
list-style:none;
padding:0;
}

li{
background:#f1f3f7;
margin:5px 0;
padding:10px;
border-radius:8px;
display:flex;
justify-content:space-between;
}

.card{
background:#f4f6f9;
padding:15px;
border-radius:10px;
margin-top:10px;
}

.calc{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:5px;
max-width:260px;
margin:auto;
}

</style>

</head>

<body>

<header>
🎒 Mochila Escolar Inteligente
</header>

<div class="imagem-topo">
<img src="shrek.jpg">
</div>

<nav>

<button onclick="abrir('tarefas')">📚 Tarefas</button>
<button onclick="abrir('provas')">📅 Provas</button>
<button onclick="abrir('notas')">📊 Notas</button>
<button onclick="abrir('estudo')">🧠 Estudo</button>
<button onclick="abrir('modoProva')">📝 Prova</button>
<button onclick="abrir('resumos')">📚 Resumos</button>
<button onclick="abrir('calculadora')">🧮 Calculadora</button>
<button onclick="abrir('iaPerguntas')">🤖 IA Perguntas</button>
<button onclick="abrir('caderno')">📓 Caderno</button>

</nav>

<section id="tarefas" class="active">

<h2>Tarefas</h2>

<input id="tarefaInput" placeholder="Nova tarefa">
<button onclick="addTarefa()">Adicionar</button>

<ul id="listaTarefas"></ul>

</section>

<section id="provas">

<h2>Calendário de Provas</h2>

<input type="date" id="dataProva">
<input id="materiaProva" placeholder="Matéria">

<button onclick="addProva()">Adicionar</button>

<ul id="listaProvas"></ul>

</section>

<section id="notas">

<h2>Gráfico de Notas</h2>

<input id="materiaNota" placeholder="Matéria">
<input id="valorNota" type="number" placeholder="Nota">

<button onclick="addNota()">Adicionar</button>

<canvas id="grafico"></canvas>

</section>

<section id="estudo">

<h2>Modo Estudo</h2>

<button onclick="gerarEstudo()">Gerar plano</button>

<div id="planoEstudo"></div>

</section>

<section id="modoProva">

<h2>Modo Prova</h2>

<div id="pergunta"></div>

<input id="respostaUsuario" placeholder="Resposta">

<button onclick="verificar()">Responder</button>

<p id="resultado"></p>

</section>

<section id="resumos">

<h2>Resumos</h2>

<textarea id="resumoTexto" rows="4"></textarea>

<button onclick="salvarResumo()">Salvar</button>

<div id="listaResumos"></div>

</section>

<section id="calculadora">

<h2>Calculadora</h2>

<input id="display" style="width:260px;font-size:20px;text-align:right">

<div class="calc">

<button onclick="addCalc('7')">7</button>
<button onclick="addCalc('8')">8</button>
<button onclick="addCalc('9')">9</button>
<button onclick="addCalc('/')">÷</button>

<button onclick="addCalc('4')">4</button>
<button onclick="addCalc('5')">5</button>
<button onclick="addCalc('6')">6</button>
<button onclick="addCalc('*')">×</button>

<button onclick="addCalc('1')">1</button>
<button onclick="addCalc('2')">2</button>
<button onclick="addCalc('3')">3</button>
<button onclick="addCalc('-')">−</button>

<button onclick="addCalc('0')">0</button>
<button onclick="addCalc('.')">.</button>
<button onclick="calcular()">=</button>
<button onclick="addCalc('+')">+</button>

<button onclick="limparCalc()" style="grid-column:span 4;background:red">Limpar</button>

</div>

</section>

<section id="iaPerguntas">

<h2>IA Geradora de Perguntas</h2>

<input id="materiaIA" placeholder="Digite a matéria">

<button onclick="gerarPerguntasIA()">Gerar perguntas</button>

<div id="listaPerguntasIA"></div>

</section>

<section id="caderno">

<h2>📓 Caderno Digital</h2>

<input id="tituloNota" placeholder="Título da anotação">

<br>

<textarea id="conteudoNota" rows="5" placeholder="Escreva sua anotação..."></textarea>

<br>

<button onclick="salvarNota()">Salvar anotação</button>

<div id="listaNotas"></div>

</section>

<script>

function abrir(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

/* tarefas */

let tarefas=JSON.parse(localStorage.getItem("tarefas"))||[]

function salvarTarefas(){
localStorage.setItem("tarefas",JSON.stringify(tarefas))
}

function addTarefa(){

let texto=document.getElementById("tarefaInput").value
if(texto==="")return

tarefas.push(texto)

document.getElementById("tarefaInput").value=""

salvarTarefas()
mostrarTarefas()

}

function mostrarTarefas(){

let ul=document.getElementById("listaTarefas")
ul.innerHTML=""

tarefas.forEach((t,i)=>{

let li=document.createElement("li")

li.innerHTML=t+" <button onclick='removerTarefa("+i+")'>❌</button>"

ul.appendChild(li)

})

}

function removerTarefa(i){

tarefas.splice(i,1)

salvarTarefas()
mostrarTarefas()

}

mostrarTarefas()

/* provas */

let provas=[]

function addProva(){

let data=document.getElementById("dataProva").value
let materia=document.getElementById("materiaProva").value

if(data==""||materia=="")return

provas.push({data,materia})

mostrarProvas()

}

function mostrarProvas(){

let ul=document.getElementById("listaProvas")
ul.innerHTML=""

provas.forEach(p=>{

let li=document.createElement("li")

li.innerText=p.materia+" - "+p.data

ul.appendChild(li)

})

}

/* notas */

let materias=[]
let notas=[]

let chart=new Chart(document.getElementById("grafico"),{
type:"bar",
data:{labels:materias,datasets:[{label:"Notas",data:notas}]}
})

function addNota(){

let m=document.getElementById("materiaNota").value
let n=document.getElementById("valorNota").value

materias.push(m)
notas.push(n)

chart.update()

}

/* estudo */

function gerarEstudo(){

let materias=["Matemática","Português","História","Geografia","Ciências"]

let div=document.getElementById("planoEstudo")

div.innerHTML=""

materias.forEach(m=>{

let c=document.createElement("div")

c.className="card"

c.innerText="Estudar "+m+" por 30 minutos"

div.appendChild(c)

})

}

/* modo prova */

let perguntas=[
{p:"5+5?",r:"10"},
{p:"Capital do Brasil?",r:"brasilia"},
{p:"3x3?",r:"9"}
]

let atual=0

function novaPergunta(){
document.getElementById("pergunta").innerText=perguntas[atual].p
}

function verificar(){

let resp=document.getElementById("respostaUsuario").value.toLowerCase()

if(resp==perguntas[atual].r){
document.getElementById("resultado").innerText="✅ Correto"
}else{
document.getElementById("resultado").innerText="❌ Errado"
}

atual=(atual+1)%perguntas.length

novaPergunta()

document.getElementById("respostaUsuario").value=""

}

novaPergunta()

/* resumos */

let resumos=[]

function salvarResumo(){

let txt=document.getElementById("resumoTexto").value

if(txt==="")return

resumos.push(txt)

mostrarResumos()

document.getElementById("resumoTexto").value=""

}

function mostrarResumos(){

let div=document.getElementById("listaResumos")

div.innerHTML=""

resumos.forEach(r=>{

let c=document.createElement("div")

c.className="card"

c.innerText=r

div.appendChild(c)

})

}

/* calculadora */

function addCalc(v){
document.getElementById("display").value+=v
}

function calcular(){

try{
document.getElementById("display").value=
eval(document.getElementById("display").value)
}catch{
document.getElementById("display").value="Erro"
}

}

function limparCalc(){
document.getElementById("display").value=""
}

/* IA perguntas */

function gerarPerguntasIA(){

let materia=document.getElementById("materiaIA").value.toLowerCase()

let perguntas=[]

if(materia.includes("mat")){
perguntas=[
"Quanto é 8 x 7?",
"Quanto é 25 + 18?",
"Quanto é 100 ÷ 4?",
"Quanto é 9²?"
]
}

else if(materia.includes("hist")){
perguntas=[
"Em que ano o Brasil foi descoberto?",
"Quem foi Dom Pedro I?",
"O que foi a Revolução Francesa?"
]
}

else{
perguntas=[
"Explique o conteúdo estudado.",
"Quais são os pontos principais?",
"O que você aprendeu hoje?"
]
}

let div=document.getElementById("listaPerguntasIA")

div.innerHTML=""

perguntas.forEach(p=>{

let card=document.createElement("div")

card.className="card"

card.innerText=p

div.appendChild(card)

})

}

/* CADERNO */

let notasCaderno = JSON.parse(localStorage.getItem("notasCaderno")) || [];

function salvarNota(){

let titulo = document.getElementById("tituloNota").value;
let conteudo = document.getElementById("conteudoNota").value;

if(titulo === "" || conteudo === "") return;

notasCaderno.push({titulo, conteudo});

localStorage.setItem("notasCaderno", JSON.stringify(notasCaderno));

document.getElementById("tituloNota").value="";
document.getElementById("conteudoNota").value="";

mostrarNotas();
}

function mostrarNotas(){

let div=document.getElementById("listaNotas");

div.innerHTML="";

notasCaderno.forEach((nota,i)=>{

let card=document.createElement("div");

card.className="card";

card.innerHTML="<b>"+nota.titulo+"</b><br>"+nota.conteudo+"<br><br><button onclick='removerNota("+i+")'>❌ Excluir</button>";

div.appendChild(card);

});

}

function removerNota(i){

notasCaderno.splice(i,1);

localStorage.setItem("notasCaderno", JSON.stringify(notasCaderno));

mostrarNotas();

}

mostrarNotas()

</script>

</body>
</html>
