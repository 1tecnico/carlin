<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila do Carlin - Minha Matéria</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4e73df, #1cc88a);
    margin: 0;
    padding: 20px;
    text-align: center;
    color: white;
}

h1 {
    margin-bottom: 5px;
}

.container {
    background: white;
    color: black;
    max-width: 500px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

input {
    padding: 10px;
    width: 65%;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    padding: 10px;
    border: none;
    border-radius: 5px;
    background: #4e73df;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2e59d9;
}

ul {
    list-style: none;
    padding: 0;
    margin-top: 20px;
}

li {
    background: #f8f9fc;
    margin: 8px 0;
    padding: 10px;
    border-radius: 5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.remover {
    background: red;
    padding: 5px 8px;
    font-size: 12px;
}

.contador {
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>🎒 Mochila do Carlin</h1>
<p>Minha Matéria 📚</p>

<div class="container">
    <input type="text" id="itemInput" placeholder="Digite o material...">
    <button onclick="adicionarItem()">Adicionar</button>

    <ul id="lista"></ul>

    <div class="contador">
        Total de itens: <span id="total">0</span>
    </div>
</div>

<script>
const input = document.getElementById("itemInput");
const lista = document.getElementById("lista");
const total = document.getElementById("total");

let itens = JSON.parse(localStorage.getItem("mochilaCarlin")) || [];

function atualizarLista() {
    lista.innerHTML = "";
    itens.forEach((item, index) => {
        const li = document.createElement("li");
        li.innerHTML = `
            📘 ${item}
            <button class="remover" onclick="removerItem(${index})">X</button>
        `;
        lista.appendChild(li);
    });
    total.textContent = itens.length;
    localStorage.setItem("mochilaCarlin", JSON.stringify(itens));
}

function adicionarItem() {
    const valor = input.value.trim();
    if (valor === "") return;

    itens.push(valor);
    input.value = "";
    atualizarLista();
}

function removerItem(index) {
    itens.splice(index, 1);
    atualizarLista();
}
