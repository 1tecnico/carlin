<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila PRO MAX</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0f172a;color:white;}
header{padding:15px;text-align:center;font-size:22px;background:#1e293b;}
nav{display:flex;justify-content:space-around;background:#1e293b;padding:10px;position:fixed;bottom:0;width:100%;}
nav button{background:none;border:none;color:white;font-size:14px;}
section{display:none;padding:15px;margin-bottom:60px;}
.active{display:block;}
.card{background:#1e293b;padding:15px;border-radius:12px;margin-top:10px;}
input,textarea{width:100%;margin:5px 0;padding:10px;border-radius:8px;border:none;}
button{padding:10px;border:none;border-radius:8px;background:#3b82f6;color:white;margin:3px;}
.materia{padding:10px;background:#334155;border-radius:10px;margin:5px 0;cursor:pointer;}
</style>
</head>

<body>

<header>📱 Mochila PRO MAX</header>

<section id="materias" class="active">
<h2>📚 Matérias</h2>
<input id="novaMateria" placeholder="Nova matéria">
<button onclick="addMateria()">Adicionar</button>
<div id="listaMaterias"></div>
</section>

<section id="caderno">
<h2 id="tituloMateria">📓 Caderno</h2>
<input id="tituloNota" placeholder="Título">
<textarea id="conteudoNota"></textarea>
<button onclick="salvarNota()">Salvar</button>
<button onclick="resumoIA()">Resumo IA</button>
<button onclick="perguntaIA()">Pergunta IA</button>
<div id="listaNotas"></div>
</section>

<section id="calendario">
<h2>⏰ Calendário</h2>
<input type="date" id="dataProva">
<input id="descProva" placeholder="Descrição">
<button onclick="addEvento()">Salvar</button>
<div id="listaEventos"></div>
</section>

<section id="game">
<h2>🎮 Progresso</h2>
<p>Pontos: <span id="pontos">0</span></p>
<p>Streak: <span id="streak">0</span></p>
<button onclick="estudei()">Estudei hoje</button>
</section>

<nav>
<button onclick="abrir('materias')">📚</button>
<button onclick="abrir('caderno')">📓</button>
<button onclick="abrir('calendario')">⏰</button>
<button onclick="abrir('game')">🎮</button>
</nav>

<script>

function abrir(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

/* MATÉRIAS */
let materias = JSON.parse(localStorage.getItem("materias")) || []
let materiaAtual = ""

function addMateria(){
let nome=document.getElementById("novaMateria").value
if(!nome)return
materias.push(nome)
localStorage.setItem("materias",JSON.stringify(materias))
mostrarMaterias()
}

function mostrarMaterias(){
let div=document.getElementById("listaMaterias")
div.innerHTML=""
materias.forEach(m=>{
div.innerHTML+=`<div class="materia" onclick="abrirMateria('${m}')">${m}</div>`
})
}

function abrirMateria(m){
materiaAtual=m
document.getElementById("tituloMateria").innerText="📓 "+m
abrir("caderno")
mostrarNotas()
}

mostrarMaterias()

/* CADERNO */
let notas = JSON.parse(localStorage.getItem("notas")) || []

function salvarNota(){
let t=document.getElementById("tituloNota").value
let c=document.getElementById("conteudoNota").value
if(!t||!c||!materiaAtual)return
notas.push({m:materiaAtual,t,c})
localStorage.setItem("notas",JSON.stringify(notas))
mostrarNotas()
}

function mostrarNotas(){
let div=document.getElementById("listaNotas")
div.innerHTML=""
notas.filter(n=>n.m==materiaAtual).forEach(n=>{
div.innerHTML+=`<div class="card"><b>${n.t}</b><br>${n.c}</div>`
})
}

/* IA */
function resumoIA(){
let txt=document.getElementById("conteudoNota").value
alert("Resumo:\n"+txt.split(".").slice(0,3).join("."))
}

function perguntaIA(){
let txt=document.getElementById("conteudoNota").value.split(" ")
alert("Pergunta: Explique "+txt.slice(0,6).join(" "))
}

/* CALENDÁRIO */
let eventos = JSON.parse(localStorage.getItem("eventos")) || []

function addEvento(){
let data=document.getElementById("dataProva").value
let desc=document.getElementById("descProva").value
if(!data||!desc)return
eventos.push({data,desc})
localStorage.setItem("eventos",JSON.stringify(eventos))
mostrarEventos()
}

function mostrarEventos(){
let div=document.getElementById("listaEventos")
div.innerHTML=""
let hoje = new Date().toISOString().split("T")[0]

eventos.forEach(e=>{
let alerta = (e.data === hoje) ? "⚠️ HOJE" : ""
div.innerHTML+=`<div class="card">${e.desc} - ${e.data} ${alerta}</div>`
})
}

mostrarEventos()

/* GAME */
let pontos = parseInt(localStorage.getItem("pontos"))||0
let streak = parseInt(localStorage.getItem("streak"))||0

function estudei(){
pontos+=10
streak++
localStorage.setItem("pontos",pontos)
localStorage.setItem("streak",streak)
atualizar()
}

function atualizar(){
document.getElementById("pontos").innerText=pontos
document.getElementById("streak").innerText=streak
}

atualizar()

</script>

</body>
</html>
