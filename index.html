<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Escolar PRO</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
}

header{
text-align:center;
padding:20px;
font-size:26px;
}

nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
padding:10px;
}

nav button{
padding:10px;
border:none;
border-radius:10px;
background:white;
color:#1e3c72;
font-weight:bold;
cursor:pointer;
}

section{
display:none;
max-width:900px;
margin:auto;
background:white;
color:black;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.active{display:block;}

input,textarea{
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
width:90%;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#2a5298;
color:white;
cursor:pointer;
margin:3px;
}

.card{
background:#f4f6f9;
padding:10px;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<header>🎒 Mochila Escolar PRO</header>

<nav>
<button onclick="abrir('caderno')">📓 Caderno</button>
<button onclick="abrir('notas')">📊 Notas</button>
<button onclick="abrir('provas')">📅 Provas</button>
<button onclick="abrir('game')">🎮 Game</button>
</nav>

<!-- CADERNO -->
<section id="caderno" class="active">
<h2>Caderno Inteligente</h2>

<input id="materia" placeholder="Matéria">
<input id="titulo" placeholder="Título">
<textarea id="conteudo" rows="4"></textarea>

<br>
<button onclick="salvarNota()">Salvar</button>
<button onclick="gerarResumo()">Resumo IA</button>
<button onclick="gerarPergunta()">Perguntas IA</button>
<button onclick="dica()">Dica</button>

<br><br>
<input id="buscar" onkeyup="buscar()" placeholder="Pesquisar...">

<div id="lista"></div>
</section>

<!-- NOTAS -->
<section id="notas">
<h2>Notas</h2>

<input id="notaInput" type="number" placeholder="Nota">
<button onclick="addNota()">Adicionar</button>

<p>Média: <span id="media">0</span></p>
</section>

<!-- PROVAS -->
<section id="provas">
<h2>Provas</h2>

<input type="date" id="data">
<input id="materiaProva" placeholder="Matéria">
<button onclick="addProva()">Salvar</button>

<div id="listaProvas"></div>
</section>

<!-- GAME -->
<section id="game">
<h2>Gamificação</h2>

<p>Pontos: <span id="pontos">0</span></p>
<p>Streak: <span id="streak">0</span></p>

<button onclick="estudei()">Estudei hoje</button>
</section>

<script>

/* ABAS */
function abrir(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

/* ================= CADERNO ================= */

let notas = JSON.parse(localStorage.getItem("notas")) || []

function salvarNota(){
let m=materia.value
let t=titulo.value
let c=conteudo.value

if(!m||!t||!c)return

notas.push({m,t,c,data:new Date().toLocaleDateString()})

localStorage.setItem("notas",JSON.stringify(notas))

mostrar()
}

function mostrar(){
lista.innerHTML=""

notas.forEach((n,i)=>{
lista.innerHTML+=`
<div class="card">
<b>${n.m}</b> (${n.data})<br>
${n.t}<br>${n.c}
<br>
<button onclick="editar(${i})">✏️</button>
<button onclick="excluir(${i})">❌</button>
</div>`
})
}

function editar(i){
let n=notas[i]

let m=prompt("Matéria:",n.m)
let t=prompt("Título:",n.t)
let c=prompt("Conteúdo:",n.c)

if(m&&t&&c){
notas[i]={...n,m,t,c}
localStorage.setItem("notas",JSON.stringify(notas))
mostrar()
}
}

function excluir(i){
notas.splice(i,1)
localStorage.setItem("notas",JSON.stringify(notas))
mostrar()
}

function buscar(){
let termo=buscar.value.toLowerCase()

lista.innerHTML=""

notas.filter(n=>n.m.toLowerCase().includes(termo)||n.t.toLowerCase().includes(termo))
.forEach(n=>{
lista.innerHTML+=`<div class="card"><b>${n.m}</b><br>${n.t}<br>${n.c}</div>`
})
}

/* ================= IA ================= */

function gerarResumo(){
let txt=conteudo.value
alert("Resumo: "+txt.split(".").slice(0,2).join("."))
}

function gerarPergunta(){
let txt=conteudo.value
let p=txt.split(" ").slice(0,5).join(" ")
alert("Pergunta: Explique "+p)
}

function dica(){
alert("💡 Revise em 24h e depois em 7 dias.")
}

/* ================= NOTAS ================= */

let listaNotas = JSON.parse(localStorage.getItem("notasNum")) || []

function addNota(){
let n=parseFloat(notaInput.value)
if(!n)return

listaNotas.push(n)

localStorage.setItem("notasNum",JSON.stringify(listaNotas))

let media = listaNotas.reduce((a,b)=>a+b,0)/listaNotas.length
document.getElementById("media").innerText=media.toFixed(2)
}

/* ================= PROVAS ================= */

let provas = JSON.parse(localStorage.getItem("provas")) || []

function addProva(){
provas.push({data:data.value,materia:materiaProva.value})
localStorage.setItem("provas",JSON.stringify(provas))
alert("Salvo!")
}

/* ================= GAME ================= */

let pontos = parseInt(localStorage.getItem("pontos")) || 0
let streak = parseInt(localStorage.getItem("streak")) || 0

function estudei(){
pontos+=10
streak++

localStorage.setItem("pontos",pontos)
localStorage.setItem("streak",streak)

atualizar()
}

function atualizar(){
document.getElementById("pontos").innerText=pontos
document.getElementById("streak").innerText=streak
}

mostrar()
atualizar()

</script>

</body>
</html>
